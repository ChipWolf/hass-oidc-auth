{% extends "base.html" %}
{% block title %}Signing in...{% endblock %}
{% block content %}
<div class="text-center">
    <h1 class="text-2xl font-bold mb-4">Completing sign-in...</h1>
    <p id="status" class="mb-4">Please wait, you will be redirected automatically.</p>
    <pre id="error" class="hidden text-left text-sm bg-red-50 text-red-700 p-3 rounded"></pre>
    <div
      id="handoff-data"
      data-code="{{ code | e }}"
      data-return-to="{{ return_to | default('', true) | e }}"
      class="hidden"
    ></div>
</div>

<script>
  (async () => {
    const handoffData = document.getElementById("handoff-data");
    const code = handoffData?.dataset?.code || "";
    const returnTo = handoffData?.dataset?.returnTo || "";
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");

    const showError = (message) => {
      statusEl.textContent = "Sign-in failed.";
      errorEl.classList.remove("hidden");
      errorEl.textContent = message;
    };

    const hassUrl = window.location.origin;
    const mobileAuthContext = (() => {
      if (!returnTo) {
        return null;
      }

      try {
        const authorizeUrl = new URL(returnTo, window.location.origin);
        if (authorizeUrl.pathname !== "/auth/authorize") {
          return null;
        }

        const redirectUri = authorizeUrl.searchParams.get("redirect_uri");
        const requestedClientId = authorizeUrl.searchParams.get("client_id");
        if (!redirectUri || !requestedClientId) {
          return null;
        }

        const isMobileRedirect =
          redirectUri.startsWith("homeassistant://auth-callback") ||
          redirectUri.startsWith("homeassistant-dev://auth-callback") ||
          redirectUri.startsWith("homeassistant-beta://auth-callback");
        if (!isMobileRedirect) {
          return null;
        }

        return {
          clientId: requestedClientId,
          redirectUri,
        };
      } catch (_) {
        return null;
      }
    })();

    const clientId = mobileAuthContext?.clientId ?? `${window.location.origin}/`;
    const redirectUri =
      mobileAuthContext?.redirectUri ?? `${window.location.origin}/?auth_callback=1`;

    const postJson = async (url, payload) => {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify(payload),
      });
      const data = await response.json().catch(() => ({}));
      return { response, data };
    };

    try {
      if (!code) {
        showError("Missing handoff code.");
        return;
      }

      const { response: flowResp, data: flowData } = await postJson(
        "/auth/login_flow",
        {
          client_id: clientId,
          handler: ["auth_oidc", "default"],
          redirect_uri: redirectUri,
          type: "form",
        }
      );

      if (!flowResp.ok || !flowData.flow_id) {
        showError(`Failed to create login flow: ${JSON.stringify(flowData)}`);
        return;
      }

      const flowId = flowData.flow_id;
      const { response: finishResp, data: finishData } = await postJson(
        `/auth/login_flow/${flowId}`,
        {
          client_id: clientId,
          code: code,
        }
      );

      if (!finishResp.ok) {
        showError(`Failed to complete login flow: ${JSON.stringify(finishData)}`);
        return;
      }

      const authCode =
        finishData?.data?.auth_code ||
        (typeof finishData?.result === "string" ? finishData.result : null);

      if (mobileAuthContext) {
        if (!authCode) {
          showError(`Missing auth code for app callback: ${JSON.stringify(finishData)}`);
          return;
        }

        const callbackUrl = new URL(mobileAuthContext.redirectUri);
        callbackUrl.searchParams.set("code", authCode);
        window.location.replace(callbackUrl.toString());
        return;
      }

      let tokenData = null;
      if (finishData?.data?.access_token) {
        tokenData = finishData.data;
      } else if (authCode) {
        const tokenResponse = await fetch("/auth/token", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          credentials: "same-origin",
          body: new URLSearchParams({
            grant_type: "authorization_code",
            code: authCode,
            client_id: clientId,
          }),
        });
        tokenData = await tokenResponse.json().catch(() => ({}));
        if (!tokenResponse.ok || !tokenData?.access_token) {
          showError(`Failed to exchange auth code for token: ${JSON.stringify(tokenData)}`);
          return;
        }
      } else {
        showError(`Unexpected login flow response: ${JSON.stringify(finishData)}`);
        return;
      }

      // HA's frontend requires hassUrl and clientId in the stored tokens
      // for WebSocket connection and token refresh to work.
      tokenData.hassUrl = hassUrl;
      tokenData.clientId = clientId;
      localStorage.setItem("hassTokens", JSON.stringify(tokenData));
      window.location.replace("/?oidc_handoff=1");
    } catch (error) {
      showError(String(error));
    }
  })();
</script>
{% endblock %}
